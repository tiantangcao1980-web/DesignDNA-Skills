name: Design MD Request
description: Request a DESIGN.md generated from a website
title: "DESIGN.md for <your website>"
labels: ["design-md"]

body:
  - type: markdown
    attributes:
      value: |
        Fill out the form below to request a DESIGN.md generation for a website.
  - type: input
    id: website
    attributes:
      label: Website URL
      description: The website you want us to generate DESIGN.md for
      placeholder: https://example.com
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Additional Details (optional)
      description: Anything else you'd like us to know about this request (specific pages, dark mode, etc.)
    validations:
      required: false
