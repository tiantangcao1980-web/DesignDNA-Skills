<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#0a0f0a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="dna1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="dna2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- DNA Helix Left Decoration -->
  <g transform="translate(80, 40)" filter="url(#softglow)">
    <!-- Strand 1 -->
    <path d="M0,0 C30,20 30,40 0,60 C-30,80 -30,100 0,120 C30,140 30,160 0,180 C-30,200 -30,220 0,240 C30,260 30,280 0,300 C-30,320 -30,330 0,340"
          fill="none" stroke="url(#dna1)" stroke-width="2.5" opacity="0.7"/>
    <!-- Strand 2 -->
    <path d="M0,0 C-30,20 -30,40 0,60 C30,80 30,100 0,120 C-30,140 -30,160 0,180 C30,200 30,220 0,240 C-30,260 -30,280 0,300 C30,320 30,330 0,340"
          fill="none" stroke="url(#dna2)" stroke-width="2.5" opacity="0.7"/>
    <!-- Cross bars -->
    <line x1="-20" y1="30" x2="20" y2="30" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
    <line x1="-25" y1="60" x2="25" y2="60" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="90" x2="20" y2="90" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>
    <line x1="-25" y1="120" x2="25" y2="120" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="150" x2="20" y2="150" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
    <line x1="-25" y1="180" x2="25" y2="180" stroke="#ec4899" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="210" x2="20" y2="210" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
    <line x1="-25" y1="240" x2="25" y2="240" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="270" x2="20" y2="270" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>
    <line x1="-25" y1="300" x2="25" y2="300" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
    <!-- Dots at intersections -->
    <circle cx="0" cy="60" r="3" fill="#6366f1" opacity="0.6"/>
    <circle cx="0" cy="120" r="3" fill="#10b981" opacity="0.6"/>
    <circle cx="0" cy="180" r="3" fill="#ec4899" opacity="0.6"/>
    <circle cx="0" cy="240" r="3" fill="#6366f1" opacity="0.6"/>
    <circle cx="0" cy="300" r="3" fill="#10b981" opacity="0.6"/>
  </g>

  <!-- DNA Helix Right Decoration -->
  <g transform="translate(1120, 20)" filter="url(#softglow)">
    <path d="M0,0 C25,18 25,36 0,54 C-25,72 -25,90 0,108 C25,126 25,144 0,162 C-25,180 -25,198 0,216 C25,234 25,252 0,270 C-25,288 -25,306 0,324 C25,342 25,355 0,365"
          fill="none" stroke="url(#dna1)" stroke-width="2" opacity="0.5"/>
    <path d="M0,0 C-25,18 -25,36 0,54 C25,72 25,90 0,108 C-25,126 -25,144 0,162 C25,180 25,198 0,216 C-25,234 -25,252 0,270 C25,288 25,306 0,324 C-25,342 -25,355 0,365"
          fill="none" stroke="url(#dna2)" stroke-width="2" opacity="0.5"/>
    <line x1="-18" y1="54" x2="18" y2="54" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="-18" y1="108" x2="18" y2="108" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <line x1="-18" y1="162" x2="18" y2="162" stroke="#ec4899" stroke-width="1" opacity="0.3"/>
    <line x1="-18" y1="216" x2="18" y2="216" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="-18" y1="270" x2="18" y2="270" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <line x1="-18" y1="324" x2="18" y2="324" stroke="#ec4899" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="350" r="120" fill="#10b981" opacity="0.03"/>
  <circle cx="900" cy="80" r="150" fill="#6366f1" opacity="0.03"/>
  <circle cx="1050" cy="320" r="100" fill="#ec4899" opacity="0.02"/>

  <!-- Main Title -->
  <text x="600" y="135" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">
    Design<tspan fill="url(#accent1)">DNA</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="180" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#a1a1aa" letter-spacing="6" font-weight="300">
    AI DESIGN SYSTEM SKILL
  </text>

  <!-- Separator line -->
  <rect x="480" y="200" width="240" height="1" fill="url(#accent1)" opacity="0.4" rx="0.5"/>

  <!-- Stats Row -->
  <g transform="translate(600, 245)" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
    <!-- 58 Brands -->
    <g transform="translate(-340, 0)">
      <text y="0" font-size="32" font-weight="700" fill="#10b981" filter="url(#glow)">58</text>
      <text y="24" font-size="13" fill="#71717a" letter-spacing="1.5" font-weight="400">BRANDS</text>
    </g>
    <!-- Dot separator -->
    <circle cx="-220" cy="-2" r="2" fill="#3f3f46"/>
    <!-- 10 Rules -->
    <g transform="translate(-120, 0)">
      <text y="0" font-size="32" font-weight="700" fill="#818cf8" filter="url(#glow)">10</text>
      <text y="24" font-size="13" fill="#71717a" letter-spacing="1.5" font-weight="400">RULES</text>
    </g>
    <!-- Dot separator -->
    <circle cx="0" cy="-2" r="2" fill="#3f3f46"/>
    <!-- 5 C-Rules -->
    <g transform="translate(120, 0)">
      <text y="0" font-size="32" font-weight="700" fill="#c084fc" filter="url(#glow)">5</text>
      <text y="24" font-size="13" fill="#71717a" letter-spacing="1.5" font-weight="400">C-RULES</text>
    </g>
    <!-- Dot separator -->
    <circle cx="220" cy="-2" r="2" fill="#3f3f46"/>
    <!-- 10 Archetypes -->
    <g transform="translate(340, 0)">
      <text y="0" font-size="32" font-weight="700" fill="#f472b6" filter="url(#glow)">10</text>
      <text y="24" font-size="13" fill="#71717a" letter-spacing="1.5" font-weight="400">ARCHETYPES</text>
    </g>
  </g>

  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#a1a1aa" font-weight="300">
    Turn world-class brand design systems into production-grade AI-generated UI
  </text>

  <!-- Bottom tech pills -->
  <g transform="translate(600, 355)" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="11">
    <g transform="translate(-240, 0)">
      <rect x="-52" y="-12" width="104" height="24" rx="12" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
      <text y="4" fill="#10b981" font-weight="500">Claude Code</text>
    </g>
    <g transform="translate(-110, 0)">
      <rect x="-38" y="-12" width="76" height="24" rx="12" fill="#818cf8" fill-opacity="0.1" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1"/>
      <text y="4" fill="#818cf8" font-weight="500">Cursor</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#c084fc" fill-opacity="0.1" stroke="#c084fc" stroke-opacity="0.25" stroke-width="1"/>
      <text y="4" fill="#c084fc" font-weight="500">Windsurf</text>
    </g>
    <g transform="translate(110, 0)">
      <rect x="-30" y="-12" width="60" height="24" rx="12" fill="#f472b6" fill-opacity="0.1" stroke="#f472b6" stroke-opacity="0.25" stroke-width="1"/>
      <text y="4" fill="#f472b6" font-weight="500">Codex</text>
    </g>
    <g transform="translate(210, 0)">
      <rect x="-38" y="-12" width="76" height="24" rx="12" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-opacity="0.25" stroke-width="1"/>
      <text y="4" fill="#fbbf24" font-weight="500">Stitch</text>
    </g>
  </g>

  <!-- Border frame -->
  <rect x="0.5" y="0.5" width="1199" height="399" fill="none" stroke="#27272a" stroke-width="1" rx="8"/>
</svg>